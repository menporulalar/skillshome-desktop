name: Release

# Builds SkillsHome Desktop for macOS (Apple Silicon + Intel), Windows, and Linux,
# and attaches the installers to a GitHub Release. Triggered by pushing a `v*` tag.
#
# These builds are UNSIGNED (no Apple notarization, no Windows code-signing cert
# configured yet — see README.md). macOS Gatekeeper and Windows SmartScreen will
# warn on first launch; that's expected until signing is set up as a fast-follow.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust build cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Baked in at compile time via Rust's option_env! (src-tauri/src/auth/backend_client.rs) —
          # unset here, v0.1.0 silently compiled with the http://localhost:3000 fallback, so
          # sign-in appeared to work through the browser step then failed reaching the backend.
          SKILLSHOME_BACKEND_URL: https://app.skillshome.me
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'SkillsHome Desktop ${{ github.ref_name }}'
          releaseBody: |
            ## SkillsHome Desktop ${{ github.ref_name }}

            **These installers are currently unsigned.** You'll see an OS security
            warning on first launch — this is expected, not a sign of a bad download:

            - **macOS**: Gatekeeper will say the app "cannot be opened because it is
              from an unidentified developer." Right-click (or Control-click) the app
              → **Open** → **Open** again in the confirmation dialog.
            - **Windows**: SmartScreen will show "Windows protected your PC." Click
              **More info** → **Run anyway**.

            Proper code signing (Apple notarization + a Windows code-signing
            certificate) is a planned fast-follow — see the README.

            Choose the download for your platform below.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
